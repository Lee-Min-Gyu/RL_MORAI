[udp]
host = "127.0.0.1"
control_port = 9095
control_bind_host = "127.0.0.1"
control_bind_port = 0
vehicle_status_port = 9094
object_port = 9094
collision_port = 9092
control_mode = "morai_ctrl_cmd"
entity_id = "EGO"

[env]
step_hz = 10.0
action_repeat = 1
max_steps = 500
target_speed_mps = 12.0
done_stop_duration_sec = 0.5
off_track_distance_m = 3.0
stop_speed_threshold_mps = 0.3
stop_timeout_steps = 40
state_timeout_sec = 1.0
no_progress_window_steps = 100
no_progress_epsilon_m = 0.5
reverse_progress_window_steps = 10
reverse_progress_threshold_m = -0.5
stalled_penalty = 5.0
blocked_collision_window_steps = 5
blocked_collision_speed_threshold_mps = 0.3
blocked_collision_min_throttle = 0.3
blocked_collision_max_brake = 0.1
blocked_collision_progress_epsilon_m = 0.15
blocked_collision_boundary_overlap_ratio = 0.05
blocked_collision_outside_ratio = 0.15
blocked_collision_penalty = 100.0

[reset]
command = ""
scenario_load_enabled = true
scenario_load_bind_host = "127.0.0.1"
scenario_load_bind_port = 0
scenario_load_destination_host = "127.0.0.1"
scenario_load_destination_port = 9103
scenario_load_file_name = "RL_1"
scenario_load_file_names = ["RL_0", "RL_1", "RL_2", "RL_3", "RL_4", "RL_5", "RL_6", "RL_7", "RL_8"]
scenario_selection_mode = "round_robin"
scenario_delete_all = true
scenario_load_network_connection_data = true
scenario_load_ego_vehicle_data = true
scenario_load_surrounding_vehicle_data = true
scenario_load_pedestrian_data = true
scenario_load_object_data = true
scenario_set_pause = false
command_timeout_sec = 20.0
min_reset_interval_sec = 8.0
post_command_wait_sec = 5.0
stable_speed_tolerance_mps = 0.3
stable_position_tolerance_m = 0.5
stable_frames_required = 5
reset_timeout_sec = 25.0
allow_unstable_reset = false
max_reset_attempts = 1
reset_retry_wait_sec = 5.0

[path]
csv_path = "../output/reference_path_centerline.csv"

[route]
enabled = true
link_set_path = "../MORAI-ADModule/mgeo/lib/mgeo_data/R_KR_PG_K-City/link_set.json"
corridor_selection_path = "../output/selected_links.json"
corridor_selection_key = "selected_link_ids"
corridor_margin_m = 0.5

[observation]
mode = "bev"

[bev]
width_px = 96
height_px = 96
front_range_m = 30.0
rear_range_m = 10.0
left_range_m = 15.0
right_range_m = 15.0
include_lane_marking = false
static_bev_npz_path = "../output/kcity_selected_links_bev/static_bev.npz"
static_bev_metadata_path = "../output/kcity_selected_links_bev/static_bev_metadata.json"
lane_marking_path = "../MORAI-ADModule/mgeo/lib/mgeo_data/R_KR_PG_K-City/lane_marking_set.json"
corridor_boundary_width_m = 0.3
centerline_width_m = 0.3
lane_marking_min_width_m = 0.15
ego_vehicle_length_m = 4.845
ego_vehicle_width_m = 1.835
ego_vehicle_offset_forward_m = 0.0
